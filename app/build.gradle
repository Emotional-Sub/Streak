plugins {
    id 'com.android.application'
}

// Release 签名凭据从版本库外读取，绝不硬编码进仓库：
// 优先读根目录 keystore.properties（已被 .gitignore 忽略），缺省再回退到环境变量。
// 三者齐全（keystore 文件存在 + 两个密码）才启用 release 签名，否则留空由 CI/开发者本地补齐，
// 避免因缺凭据导致 assembleRelease 直接失败。
def keystorePropsFile = rootProject.file('keystore.properties')
def keystoreProps = new Properties()
if (keystorePropsFile.exists()) {
    keystorePropsFile.withInputStream { keystoreProps.load(it) }
}
def resolveSigning = { String key, String env ->
    keystoreProps.getProperty(key) ?: System.getenv(env)
}
def relStoreFile = resolveSigning('storeFile', 'STREAK_STORE_FILE') ?: "${rootDir}/release/streak-release.jks"
def relStorePassword = resolveSigning('storePassword', 'STREAK_STORE_PASSWORD')
def relKeyAlias = resolveSigning('keyAlias', 'STREAK_KEY_ALIAS') ?: 'streak'
def relKeyPassword = resolveSigning('keyPassword', 'STREAK_KEY_PASSWORD')
def hasReleaseSigning = relStorePassword != null && relKeyPassword != null && file(relStoreFile).exists()

android {
    namespace 'com.streak.app'
    compileSdk 34

    defaultConfig {
        applicationId 'com.streak.app'
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName '1.0.0'

        testInstrumentationRunner 'androidx.test.runner.AndroidJUnitRunner'
        vectorDrawables {
            useSupportLibrary true
        }

        // Room exportSchema=true：把每个版本的 schema JSON 导出到 app/schemas，
        // 纳入版本库以留存历史 schema、支撑迁移测试（MigrationTestHelper 读取旧 schema）。
        javaCompileOptions {
            annotationProcessorOptions {
                arguments += ["room.schemaLocation": "$projectDir/schemas".toString()]
            }
        }
    }

    signingConfigs {
        release {
            if (hasReleaseSigning) {
                storeFile file(relStoreFile)
                storePassword relStorePassword
                keyAlias relKeyAlias
                keyPassword relKeyPassword
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            // 签名策略（严格）：仅在凭据齐全（keystore.properties / 环境变量）时启用正式 release 签名；
            // 缺凭据时不设 signingConfig——assembleRelease 产出未签名包（无法直接安装），
            // 以此强制正式对外发布必须补齐 release 凭据，绝不静默用 debug 签名冒充正式包。
            // 需要「可直接安装」的演示包请构建 demo 类型（见下），而不是让 release 悄悄降级。
            if (hasReleaseSigning) {
                signingConfig signingConfigs.release
            }
        }
        // demo：专供答辩演示/内部试用的「可直接安装」构建。继承 debug 的可调试与 debug 签名，
        // 但用 applicationIdSuffix 让它与正式包（release/debug）在同一台设备上共存、互不覆盖。
        // 这样既保留一个随时能直装的演示包，又不牺牲 release 的签名严格性。
        demo {
            initWith debug
            applicationIdSuffix '.demo'
            versionNameSuffix '-demo'
            matchingFallbacks = ['debug']
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    buildFeatures {
        buildConfig true
        viewBinding true
    }

    testOptions {
        // Robolectric 需要在 JVM 单测里加载 Android 资源/清单，才能实例化 Context、
        // 运行依赖 android.net.Uri / Room / SharedPreferences 的存储与编解码逻辑。
        unitTests.includeAndroidResources = true
        unitTests.all {
            // 转发 loopback-fix javaagent 给 forked 测试 worker（否则受限环境下
            // 测试进程无法建立 127.0.0.1 回环连接而报 Unable to establish loopback connection）
            def agent = new File("${System.properties['user.home']}/.gradle/loopback-fix/loopback-fix.jar")
            if (agent.exists()) {
                jvmArgs "-javaagent:${agent.absolutePath}",
                        "--add-opens=java.base/sun.nio.ch=ALL-UNNAMED"
            }
        }
    }

    packaging {
        resources {
            excludes += '/META-INF/{AL2.0,LGPL2.1}'
        }
    }
}

dependencies {
    implementation 'androidx.core:core:1.13.1'
    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation 'androidx.activity:activity:1.9.2'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'androidx.recyclerview:recyclerview:1.3.2'
    implementation 'com.google.code.gson:gson:2.11.0'
    implementation 'com.google.android.material:material:1.12.0'
    implementation 'com.google.zxing:core:3.5.3'
    implementation 'com.journeyapps:zxing-android-embedded:4.3.0'
    // Room：本地 SQLite 持久化（替代早期的 Gson JSON 文件存储）
    implementation 'androidx.room:room-runtime:2.6.1'
    annotationProcessor 'androidx.room:room-compiler:2.6.1'

    testImplementation 'junit:junit:4.13.2'
    // Robolectric：在本地 JVM 单测中提供 Android 框架实现（Uri/TextUtils/Context/SharedPreferences），
    // 使依赖框架类的 QR 编解码与存储层（含内存 Room）无需真机/模拟器即可测试。
    testImplementation 'org.robolectric:robolectric:4.13'
    testImplementation 'androidx.test:core:1.6.1'
    // 内存态 Room 数据库供存储层单测使用，避免落盘、每次用例互不干扰。
    testImplementation 'androidx.room:room-testing:2.6.1'
    androidTestImplementation 'androidx.test.ext:junit:1.2.1'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.6.1'
}
