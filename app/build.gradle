plugins {
    id 'com.android.application'
}

// Release 签名凭据从版本库外读取，绝不硬编码进仓库：
// 优先读根目录 keystore.properties（已被 .gitignore 忽略），缺省再回退到环境变量。
// 三者齐全（keystore 文件存在 + 两个密码）才启用 release 签名，否则留空由 CI/开发者本地补齐，
// 避免因缺凭据导致 assembleRelease 直接失败。
def keystorePropsFile = rootProject.file('keystore.properties')
def keystoreProps = new Properties()
if (keystorePropsFile.exists()) {
    keystorePropsFile.withInputStream { keystoreProps.load(it) }
}
def resolveSigning = { String key, String env ->
    keystoreProps.getProperty(key) ?: System.getenv(env)
}
def relStoreFile = resolveSigning('storeFile', 'STREAK_STORE_FILE') ?: "${rootDir}/release/streak-release.jks"
def relStorePassword = resolveSigning('storePassword', 'STREAK_STORE_PASSWORD')
def relKeyAlias = resolveSigning('keyAlias', 'STREAK_KEY_ALIAS') ?: 'streak'
def relKeyPassword = resolveSigning('keyPassword', 'STREAK_KEY_PASSWORD')
def hasReleaseSigning = relStorePassword != null && relKeyPassword != null && file(relStoreFile).exists()

android {
    namespace 'com.streak.app'
    compileSdk 34

    defaultConfig {
        applicationId 'com.streak.app'
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName '1.0.0'

        testInstrumentationRunner 'androidx.test.runner.AndroidJUnitRunner'
        vectorDrawables {
            useSupportLibrary true
        }
    }

    signingConfigs {
        release {
            if (hasReleaseSigning) {
                storeFile file(relStoreFile)
                storePassword relStorePassword
                keyAlias relKeyAlias
                keyPassword relKeyPassword
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            // 仅在凭据齐全时套用 release 签名；否则输出未签名包，交由外部签名，
            // 避免缺少 keystore.properties/环境变量时构建直接报错。
            if (hasReleaseSigning) {
                signingConfig signingConfigs.release
            }
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    buildFeatures {
        buildConfig true
        viewBinding true
    }

    testOptions {
        unitTests.all {
            // 转发 loopback-fix javaagent 给 forked 测试 worker（否则受限环境下
            // 测试进程无法建立 127.0.0.1 回环连接而报 Unable to establish loopback connection）
            def agent = new File("${System.properties['user.home']}/.gradle/loopback-fix/loopback-fix.jar")
            if (agent.exists()) {
                jvmArgs "-javaagent:${agent.absolutePath}",
                        "--add-opens=java.base/sun.nio.ch=ALL-UNNAMED"
            }
        }
    }

    packaging {
        resources {
            excludes += '/META-INF/{AL2.0,LGPL2.1}'
        }
    }
}

dependencies {
    implementation 'androidx.core:core:1.13.1'
    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation 'androidx.activity:activity:1.9.2'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'androidx.recyclerview:recyclerview:1.3.2'
    implementation 'com.google.code.gson:gson:2.11.0'
    implementation 'com.google.android.material:material:1.12.0'
    implementation 'com.google.zxing:core:3.5.3'
    implementation 'com.journeyapps:zxing-android-embedded:4.3.0'
    // Room：本地 SQLite 持久化（替代早期的 Gson JSON 文件存储）
    implementation 'androidx.room:room-runtime:2.6.1'
    annotationProcessor 'androidx.room:room-compiler:2.6.1'

    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.2.1'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.6.1'
}
