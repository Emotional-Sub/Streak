plugins {
    id 'com.android.application'
}

android {
    namespace 'com.streak.app'
    compileSdk 34

    defaultConfig {
        applicationId 'com.streak.app'
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName '1.0.0'

        testInstrumentationRunner 'androidx.test.runner.AndroidJUnitRunner'
        vectorDrawables {
            useSupportLibrary true
        }
    }

    signingConfigs {
        release {
            storeFile file("${rootDir}/release/streak-release.jks")
            storePassword 'streak123'
            keyAlias 'streak'
            keyPassword 'streak123'
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    buildFeatures {
        buildConfig true
        viewBinding true
    }

    testOptions {
        unitTests.all {
            // 转发 loopback-fix javaagent 给 forked 测试 worker（否则受限环境下
            // 测试进程无法建立 127.0.0.1 回环连接而报 Unable to establish loopback connection）
            def agent = new File("${System.properties['user.home']}/.gradle/loopback-fix/loopback-fix.jar")
            if (agent.exists()) {
                jvmArgs "-javaagent:${agent.absolutePath}",
                        "--add-opens=java.base/sun.nio.ch=ALL-UNNAMED"
            }
        }
    }

    packaging {
        resources {
            excludes += '/META-INF/{AL2.0,LGPL2.1}'
        }
    }
}

dependencies {
    implementation 'androidx.core:core:1.13.1'
    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation 'androidx.activity:activity:1.9.2'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'androidx.recyclerview:recyclerview:1.3.2'
    implementation 'com.google.code.gson:gson:2.11.0'
    implementation 'com.google.android.material:material:1.12.0'
    implementation 'com.google.zxing:core:3.5.3'
    implementation 'com.journeyapps:zxing-android-embedded:4.3.0'

    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.2.1'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.6.1'
}
